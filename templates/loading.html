<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Basketball Shot Predictor | Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Main container */
        .loading-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Basketball court pattern overlay */
        .court-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 50%, rgba(255,107,53,0.03) 2%, transparent 2.5%);
            background-size: 30px 30px;
            pointer-events: none;
        }

        /* Logo/Brand section */
        .brand {
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #FF6B35, #FF8C42);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 15px 40px rgba(255, 107, 53, 0.5);
            }
        }

        .brand h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .brand p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            font-weight: 400;
        }

        /* Progress section */
        .progress-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 40px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-bar-container {
            width: 400px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FF6B35, #FF8C42);
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255,255,255,0.3), 
                transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        .status-text {
            color: white;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .status-subtext {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        /* Facts section */
        .facts-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            border-left: 3px solid #FF6B35;
        }

        .fact-label {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .fact-text {
            color: white;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.6;
            max-width: 400px;
            margin: 0 auto;
        }

        /* Loading dots animation */
        .loading-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 5px;
        }

        .loading-dots span {
            width: 4px;
            height: 4px;
            background: #FF6B35;
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotPulse {
            0%, 100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* Percentage display */
        .percentage {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B35, #FF8C42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .progress-section {
                padding: 20px 25px;
            }
            
            .progress-bar-container {
                width: 280px;
            }
            
            .percentage {
                font-size: 28px;
            }
            
            .brand h1 {
                font-size: 24px;
            }
            
            .logo {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }
        }

        /* Fade out animation */
        .fade-out {
            animation: fadeOut 0.6s ease-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                visibility: visible;
            }
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="particles"></div>
    <div class="court-pattern"></div>

    <div class="loading-container" id="loadingContainer">
        <div class="brand">
            <div class="logo">
                🏀
            </div>
            <h1>Shot Predictor Pro</h1>
            <p>Advanced Basketball Analytics</p>
        </div>

        <div class="progress-section">
            <div class="progress-stats">
                <span>Initializing System</span>
                <span id="percentageDisplay" class="percentage">0%</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="status-text" id="statusText">
                Loading model components
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            <div class="status-subtext" id="statusSubtext">Please wait while we prepare your experience</div>
        </div>

        <div class="facts-section">
            <div class="fact-label">📊 DID YOU KNOW?</div>
            <div class="fact-text" id="factText">
                Loading interesting facts...
            </div>
        </div>
    </div>

    <script>
        // Professional basketball facts database
        const basketballFacts = [
            {
                fact: "The NBA's three-point line is 23 feet 9 inches at the top of the key",
                icon: "🎯"
            },
            {
                fact: "Michael Jordan holds the record for highest career scoring average at 30.12 PPG",
                icon: "👑"
            },
            {
                fact: "Stephen Curry made 402 three-pointers in the 2015-16 season, an NBA record",
                icon: "🏆"
            },
            {
                fact: "The free throw line has been 15 feet from the backboard since 1895",
                icon: "📏"
            },
            {
                fact: "Wilt Chamberlain once scored 100 points in a single game (1962)",
                icon: "💯"
            },
            {
                fact: "LeBron James is the only player with 30K+ points, 10K+ rebounds, and 10K+ assists",
                icon: "🌟"
            },
            {
                fact: "The shot clock was introduced in 1954 to increase scoring and pace",
                icon: "⏱️"
            },
            {
                fact: "NBA players shoot approximately 74% from the free throw line on average",
                icon: "📈"
            },
            {
                fact: "The record for most assists in a single game is 30 by Scott Skiles",
                icon: "🎯"
            },
            {
                fact: "Dirk Nowitzki played 21 seasons with the same team (most in NBA history)",
                icon: "🤝"
            },
            {
                fact: "The highest scoring NBA game was 186-184 (Pistons vs Nuggets, 1983)",
                icon: "⚡"
            },
            {
                fact: "Kareem Abdul-Jabbar scored the most career points (38,387) before LeBron broke it",
                icon: "📊"
            }
        ];

        let progress = 0;
        let currentFactIndex = 0;
        let animationFrameId = null;
        
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const statusSubtext = document.getElementById('statusSubtext');
        const loadingContainer = document.getElementById('loadingContainer');
        const factText = document.getElementById('factText');
        const percentageDisplay = document.getElementById('percentageDisplay');

        const statusMessages = [
            { main: "Loading AI Model", sub: "Initializing neural networks and algorithms" },
            { main: "Analyzing Shot Patterns", sub: "Processing historical basketball data" },
            { main: "Calibrating Metrics", sub: "Setting up prediction parameters" },
            { main: "Loading Player Profiles", sub: "Configuring player statistics database" },
            { main: "Optimizing Performance", sub: "Fine-tuning prediction accuracy" },
            { main: "Finalizing Setup", sub: "Almost ready to predict" }
        ];

        // Generate floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 1;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDuration = `${Math.random() * 10 + 10}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                particlesContainer.appendChild(particle);
            }
        }

        // Show random fact with animation
        function showRandomFact() {
            const randomIndex = Math.floor(Math.random() * basketballFacts.length);
            const fact = basketballFacts[randomIndex];
            factText.style.opacity = '0';
            setTimeout(() => {
                factText.innerHTML = `${fact.icon} ${fact.fact}`;
                factText.style.opacity = '1';
            }, 300);
        }

        // Update UI with smooth progress
        function updateProgress(value) {
            const roundedValue = Math.floor(value);
            percentageDisplay.textContent = `${roundedValue}%`;
            progressBar.style.width = `${value}%`;
            
            // Update status messages based on progress
            const messageIndex = Math.min(Math.floor(value / 17), statusMessages.length - 1);
            if (messageIndex >= 0 && statusMessages[messageIndex]) {
                statusText.innerHTML = `${statusMessages[messageIndex].main}<div class="loading-dots"><span></span><span></span><span></span></div>`;
                statusSubtext.textContent = statusMessages[messageIndex].sub;
            }
        }

        async function initialize() {
            console.log("Initializing Shot Predictor Pro...");
            createParticles();
            showRandomFact();
            
            // Rotate facts every 4 seconds
            const factInterval = setInterval(showRandomFact, 4000);
            
            // Animate progress bar smoothly
            const startTime = Date.now();
            const duration = 2500; // 2.5 seconds for smooth loading
            
            function animateProgress() {
                const elapsed = Date.now() - startTime;
                const newProgress = Math.min((elapsed / duration) * 100, 90);
                progress = newProgress;
                updateProgress(progress);
                
                if (progress < 90) {
                    animationFrameId = requestAnimationFrame(animateProgress);
                }
            }
            
            animateProgress();
            
            try {
                // Simulate API call (replace with actual fetch if needed)
                await new Promise(resolve => setTimeout(resolve, duration));
                
                // Optional: Call your initialization endpoint
                try {
                    await fetch('/api/initialize', {
                        method: 'GET',
                        headers: {
                            'Cache-Control': 'no-cache',
                            'Pragma': 'no-cache'
                        }
                    });
                } catch (e) {
                    console.log("API endpoint not found, continuing...");
                }
                
                // Complete the progress
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                }
                
                // Animate to 100%
                let complete = 90;
                const completeInterval = setInterval(() => {
                    complete += 2;
                    updateProgress(complete);
                    if (complete >= 100) {
                        clearInterval(completeInterval);
                        statusText.innerHTML = `Ready to Predict!`;
                        statusSubtext.textContent = "Redirecting you to the dashboard...";
                        
                        setTimeout(() => {
                            loadingContainer.classList.add('fade-out');
                            setTimeout(() => {
                                window.location.href = '/?loaded=true';
                            }, 600);
                        }, 500);
                    }
                }, 30);
                
                clearInterval(factInterval);
                
            } catch (error) {
                console.error('Initialization error:', error);
                statusText.innerHTML = `Connection Error`;
                statusSubtext.textContent = "Please check your connection and refresh";
                if (animationFrameId) {
                    cancelAnimationFrame(animationFrameId);
                }
            }
        }
        
        // Handle page cache
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                console.log('Page restored from cache, reloading...');
                window.location.reload();
            }
        });
        
        // Start initialization
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initialize);
        } else {
            initialize();
        }
    </script>
</body>
</html>
