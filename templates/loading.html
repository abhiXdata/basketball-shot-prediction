<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Starting Shot Predictor | Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .loading-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
            max-width: 550px;
            width: 90%;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            margin-bottom: 35px;
        }

        .logo {
            width: 85px;
            height: 85px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #FF6B35, #FF8C42);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
            animation: logoGlow 2s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3); }
            50% { box-shadow: 0 15px 40px rgba(255, 107, 53, 0.6); }
        }

        .brand h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .brand p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }

        .server-status {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 107, 53, 0.2);
            font-family: monospace;
        }

        .status-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .status-label {
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
        }

        .status-value {
            color: #FF8C42;
            font-weight: 600;
        }

        .status-value.success {
            color: #4CAF50;
        }

        .status-value.error {
            color: #f44336;
        }

        .progress-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FF6B35, #FF8C42);
            border-radius: 10px;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .status-text {
            color: white;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .status-subtext {
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        .percentage {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B35, #FF8C42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .retry-button {
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(255,107,53,0.2);
            border: 1px solid #FF6B35;
            border-radius: 10px;
            color: #FF6B35;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .retry-button:hover {
            background: #FF6B35;
            color: white;
            transform: translateY(-2px);
        }

        .facts-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border-left: 3px solid #FF6B35;
        }

        .fact-text {
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            line-height: 1.5;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
            margin-left: 5px;
        }

        .loading-dots span {
            width: 4px;
            height: 4px;
            background: #FF6B35;
            border-radius: 50%;
            animation: dotPulse 1.4s infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .fade-out {
            animation: fadeOutPage 0.6s ease-out forwards;
        }

        @keyframes fadeOutPage {
            from { opacity: 1; }
            to { opacity: 0; visibility: hidden; }
        }

        @media (max-width: 768px) {
            .loading-container { padding: 20px; }
            .progress-section { padding: 20px; }
            .percentage { font-size: 28px; }
            .brand h1 { font-size: 24px; }
            .logo { width: 65px; height: 65px; font-size: 35px; }
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="particles"></div>

    <div class="loading-container" id="loadingContainer">
        <div class="brand">
            <div class="logo">🏀</div>
            <h1>Shot Predictor Pro</h1>
            <p>Advanced Basketball Analytics Platform</p>
        </div>

        <div class="server-status">
            <div class="status-line">
                <span class="status-label">🚀 SERVER STATUS</span>
                <span class="status-value" id="serverStatus">Starting...</span>
            </div>
            <div class="status-line">
                <span class="status-label">🎯 MODEL STATUS</span>
                <span class="status-value" id="modelStatus">Initializing</span>
            </div>
            <div class="status-line">
                <span class="status-label">⏱️ LOAD TIME</span>
                <span class="status-value" id="loadTime">--</span>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-header">
                <span>INITIALIZING SYSTEM</span>
                <span class="percentage" id="percentageDisplay">0%</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="status-text" id="statusText">
                Starting server
                <div class="loading-dots"><span></span><span></span><span></span></div>
            </div>
            <div class="status-subtext" id="statusSubtext">Preparing your experience...</div>
        </div>

        <div class="facts-section">
            <div class="fact-text" id="factText">
                ⚡ Loading interesting facts...
            </div>
        </div>
    </div>

    <script>
        const basketballFacts = [
            { fact: "The NBA three-point line is 23.75 feet from the basket at its furthest point", icon: "🎯" },
            { fact: "Michael Jordan scored 63 points in a playoff game against the Celtics", icon: "👑" },
            { fact: "Stephen Curry made 402 three-pointers in a single season", icon: "🏆" },
            { fact: "Wilt Chamberlain once averaged 50.4 points per game for an entire season", icon: "💯" },
            { fact: "LeBron James is the all-time leading scorer in NBA history", icon: "👑" },
            { fact: "The shortest NBA player was Tyrone 'Muggsy' Bogues at 5'3\"", icon: "📏" },
            { fact: "Kobe Bryant scored 81 points in a single game", icon: "🐍" },
            { fact: "The record for most assists in a game is 30 by Scott Skiles", icon: "🎯" }
        ];

        let progress = 0;
        let retryCount = 0;
        let startTime = Date.now();
        
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const statusSubtext = document.getElementById('statusSubtext');
        const loadingContainer = document.getElementById('loadingContainer');
        const factText = document.getElementById('factText');
        const percentageDisplay = document.getElementById('percentageDisplay');
        const serverStatusSpan = document.getElementById('serverStatus');
        const modelStatusSpan = document.getElementById('modelStatus');
        const loadTimeSpan = document.getElementById('loadTime');

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 3 + 1;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDuration = `${Math.random() * 10 + 8}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                particlesContainer.appendChild(particle);
            }
        }

        function showRandomFact() {
            const randomIndex = Math.floor(Math.random() * basketballFacts.length);
            const fact = basketballFacts[randomIndex];
            factText.innerHTML = `${fact.icon} ${fact.fact}`;
        }

        function updateProgress(value) {
            const roundedValue = Math.floor(value);
            percentageDisplay.textContent = `${roundedValue}%`;
            progressBar.style.width = `${value}%`;
            
            if (value < 30) {
                statusSubtext.textContent = "Waking up server from cold start...";
            } else if (value < 60) {
                statusSubtext.textContent = "Loading machine learning model...";
            } else if (value < 90) {
                statusSubtext.textContent = "Initializing prediction engine...";
            } else {
                statusSubtext.textContent = "Almost ready...";
            }
        }

        async function checkModelStatus() {
            try {
                const response = await fetch('/api/status', {
                    headers: { 'Cache-Control': 'no-cache' }
                });
                const data = await response.json();
                
                const elapsedTime = ((Date.now() - startTime) / 1000).toFixed(1);
                loadTimeSpan.textContent = `${elapsedTime}s`;
                
                if (data.model_ready) {
                    modelStatusSpan.textContent = "LOADED";
                    modelStatusSpan.className = "status-value success";
                    serverStatusSpan.textContent = "ONLINE";
                    serverStatusSpan.className = "status-value success";
                    return true;
                } else if (data.status === 'error') {
                    modelStatusSpan.textContent = "ERROR";
                    modelStatusSpan.className = "status-value error";
                    statusText.innerHTML = "Model loading failed";
                    statusSubtext.textContent = data.error || "Please refresh the page";
                    return false;
                } else {
                    modelStatusSpan.textContent = "LOADING...";
                    modelStatusSpan.className = "status-value";
                    serverStatusSpan.textContent = "INITIALIZING";
                    return false;
                }
            } catch (error) {
                console.log("Server not ready yet:", error);
                return false;
            }
        }

        async function initialize() {
            createParticles();
            showRandomFact();
            const factInterval = setInterval(showRandomFact, 4000);
            
            // Animate progress bar while waiting
            const progressInterval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 5;
                    progress = Math.min(progress, 90);
                    updateProgress(progress);
                }
            }, 500);
            
            let isReady = false;
            let attempts = 0;
            const maxAttempts = 60; // 60 seconds max wait
            
            while (!isReady && attempts < maxAttempts) {
                isReady = await checkModelStatus();
                
                if (!isReady) {
                    attempts++;
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    // Update status text based on attempts
                    if (attempts > 10) {
                        statusText.innerHTML = "Server is waking up (cold start)";
                        statusSubtext.textContent = "This may take up to 60 seconds on free tier";
                    } else if (attempts > 5) {
                        statusText.innerHTML = "Loading model from disk";
                        statusSubtext.textContent = "Please wait, model is being loaded...";
                    }
                }
            }
            
            clearInterval(progressInterval);
            clearInterval(factInterval);
            
            if (isReady) {
                // Complete the progress
                let complete = progress;
                const completeInterval = setInterval(() => {
                    complete += 2;
                    updateProgress(complete);
                    if (complete >= 100) {
                        clearInterval(completeInterval);
                        statusText.innerHTML = "Ready! Launching application...";
                        statusSubtext.textContent = "Redirecting to dashboard";
                        
                        setTimeout(() => {
                            loadingContainer.classList.add('fade-out');
                            setTimeout(() => {
                                window.location.href = '/?loaded=true';
                            }, 600);
                        }, 500);
                    }
                }, 50);
            } else {
                // Show retry button
                statusText.innerHTML = "Connection timeout";
                statusSubtext.innerHTML = 'The server is taking longer than expected. <br> <span class="retry-button" onclick="location.reload()">🔄 Retry Connection</span>';
                statusSubtext.style.cursor = "pointer";
            }
        }
        
        // Handle page cache
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                location.reload();
            }
        });
        
        // Start initialization
        initialize();
    </script>
</body>
</html>
