<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Loading - Basketball Shot Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .loading-container {
            text-align: center;
            color: white;
        }

        .basketball-loader {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            position: relative;
            animation: bounce 0.8s infinite ease-in-out;
        }

        .basketball {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #FF6B35, #D44918);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .basketball::before,
        .basketball::after {
            content: '';
            position: absolute;
            background-color: #2C1810;
            border-radius: 50%;
        }

        .basketball::before {
            width: 100%;
            height: 6px;
            top: 50%;
            transform: translateY(-50%);
        }

        .basketball::after {
            width: 6px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }

        .loading-text {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .progress-bar-container {
            width: 300px;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: #FF6B35;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .status-text {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 10px;
        }

        .shot-fact {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            font-style: italic;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .fade-out {
            animation: fadeOut 0.5s ease-out forwards;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>
<body>
    <div class="loading-container" id="loadingContainer">
        <div class="basketball-loader">
            <div class="basketball"></div>
        </div>
        <div class="loading-text">Loading Shot Predictor</div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="status-text" id="statusText">Preparing your experience...</div>
    </div>
    
    <div class="shot-fact" id="factText"></div>

    <script>
        // Basketball facts to show during loading
        const basketballFacts = [
            "🏀 Did you know? The three-point line was introduced in the NBA in 1979.",
            "📊 Michael Jordan has the highest career scoring average in NBA history (30.12 PPG).",
            "🏆 Stephen Curry holds the record for most three-pointers made in a season (402).",
            "🎯 The free throw line is 15 feet from the backboard.",
            "⏱️ The shot clock was introduced in 1954 to speed up the game.",
            "🌟 LeBron James is the only player to record 30,000 points, 10,000 rebounds, and 10,000 assists.",
            "🏀 The NBA's all-time scoring leader is LeBron James.",
            "📈 The most points scored in a single game is 100 by Wilt Chamberlain.",
            "🎪 The basketball hoop is 10 feet high.",
            "⏰ Games consist of four 12-minute quarters in the NBA.",
            "🎯 Career free throw percentage leader is Stephen Curry at 90.8%",
            "🏆 The Chicago Bulls had a 72-10 season in 1995-96"
        ];
        
        let progress = 0;
        let factIndex = 0;
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const loadingContainer = document.getElementById('loadingContainer');
        const factText = document.getElementById('factText');
        
        const statusMessages = [
            'Loading prediction model...',
            'Analyzing shot patterns...',
            'Calibrating shooting metrics...',
            'Loading player statistics...',
            'Ready to predict your shots!'
        ];
        
        // Show random basketball facts
        function showRandomFact() {
            factIndex = Math.floor(Math.random() * basketballFacts.length);
            factText.textContent = basketballFacts[factIndex];
            factText.style.opacity = '1';
        }
        
        // Start showing facts every 3 seconds
        showRandomFact();
        setInterval(showRandomFact, 3500);
        
        async function initialize() {
            console.log("Loading screen started - initializing...");
            
            // Animate progress bar
            const progressInterval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 12;
                    progress = Math.min(progress, 90);
                    progressBar.style.width = progress + '%';
                    
                    const messageIndex = Math.min(Math.floor(progress / 20), statusMessages.length - 1);
                    statusText.textContent = statusMessages[messageIndex];
                }
            }, 200);
            
            try {
                // Simulate loading time (remove or adjust as needed)
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // Call the initialization endpoint (optional)
                await fetch('/api/initialize', {
                    method: 'GET',
                    headers: {
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });
                
                clearInterval(progressInterval);
                
                // Complete the progress bar
                progressBar.style.width = '100%';
                statusText.textContent = 'Ready! Redirecting...';
                
                // Wait a moment to show completion
                await new Promise(resolve => setTimeout(resolve, 800));
                
                // Fade out loading screen
                loadingContainer.classList.add('fade-out');
                
                // Redirect to main application with loaded parameter
                setTimeout(() => {
                    window.location.href = '/?loaded=true';
                }, 500);
                
            } catch (error) {
                clearInterval(progressInterval);
                console.error('Initialization error:', error);
                statusText.textContent = 'Connection error. Retrying...';
                statusText.style.color = '#ff6b6b';
                
                // Retry after 2 seconds
                setTimeout(() => {
                    statusText.style.color = 'white';
                    statusText.textContent = 'Retrying...';
                    progress = 0;
                    progressBar.style.width = '0%';
                    initialize();
                }, 2000);
            }
        }
        
        // Prevent back/forward cache from skipping loading screen
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                console.log('Page restored from cache, reloading to show loading screen');
                window.location.reload();
            }
        });
        
        // Start initialization when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initialize);
        } else {
            console.log('Document already loaded, running initialization immediately');
            initialize();
        }
    </script>
</body>
</html>
