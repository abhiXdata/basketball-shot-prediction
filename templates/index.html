<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Shot Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .prediction-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #FF6B35;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .predict-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FF6B35, #FF8C42);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .predict-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,53,0.3);
        }

        .result-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        .result-text {
            font-size: 20px;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
            background: #f0f0f0;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏀 Basketball Shot Predictor</h1>
            <p>Enter shot parameters to predict if it will go in!</p>
        </div>

        <div class="prediction-card">
            <form action="/predict" method="POST">
                <div class="form-row">
                    <div class="input-group">
                        <label>Action Type:</label>
                        <input type="number" name="action_type" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Combined Shot Type:</label>
                        <input type="number" name="combined_shot_type" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Location X:</label>
                        <input type="number" step="any" name="loc_x" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Location Y:</label>
                        <input type="number" step="any" name="loc_y" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Period:</label>
                        <input type="number" name="period" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Playoffs (0 or 1):</label>
                        <input type="number" name="playoffs" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Season:</label>
                        <input type="number" name="season" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Shot Distance:</label>
                        <input type="number" name="shot_distance" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Shot Type:</label>
                        <input type="number" name="shot_type" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Shot Zone Area:</label>
                        <input type="number" name="shot_zone_area" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Shot Zone Basic:</label>
                        <input type="number" name="shot_zone_basic" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Shot Zone Range:</label>
                        <input type="number" name="shot_zone_range" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Matchup:</label>
                        <input type="number" name="matchup" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Opponent:</label>
                        <input type="number" name="opponent" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Time Remaining:</label>
                    <input type="number" name="time_remaining" required>
                </div>
                
                <button type="submit" class="predict-btn">Predict Shot</button>
            </form>
        </div>
        
        {% if prediction_text %}
        <div class="result-card">
            <div class="result-text">
                {{ prediction_text }}
            </div>
        </div>
        {% endif %}

        <div class="footer">
            <p>Powered by Machine Learning</p>
        </div>
    </div>
</body>
</html>
