<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Basketball Shot Predictor | Mamba Mentality</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Full background image with overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('static/images/kobe-bryant.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            z-index: -2;
        }

        /* Dark overlay for better text contrast */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.7) 100%);
            z-index: -1;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            background: rgba(255,107,53,0.15);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 0;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Content wrapper - cards on left side */
        .content-wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .container {
            max-width: 650px;
            width: 100%;
            margin: 0;
        }

        /* Form Card */
        .form-card {
            background: rgba(255,255,255,0.98);
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
        }

        .form-card.hide {
            display: none;
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #FF6B35;
        }

        .form-header h1 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .form-header h1 span {
            background: linear-gradient(135deg, #FF6B35, #FF8C42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .form-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .kobe-tribute {
            text-align: center;
            margin-top: 10px;
            font-size: 0.8rem;
            color: #FF6B35;
            font-weight: 600;
        }

        /* Form grid layout */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        .form-grid::-webkit-scrollbar {
            width: 8px;
        }

        .form-grid::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .form-grid::-webkit-scrollbar-thumb {
            background: #FF6B35;
            border-radius: 10px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group label i {
            color: #FF6B35;
            margin-right: 5px;
        }

        .input-group input, .input-group select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
            background: white;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #FF6B35;
            box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
        }

        .input-group input:hover, .input-group select:hover {
            border-color: #FF8C42;
        }

        /* Predict button */
        .predict-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #FF6B35, #FF8C42);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .predict-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .predict-btn:hover::before {
            left: 100%;
        }

        .predict-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,107,53,0.4);
        }

        /* Result Card */
        .result-card {
            background: rgba(255,255,255,0.98);
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        .result-card.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .result-header h2 {
            color: #333;
            font-size: 1.5rem;
        }

        .prediction-result {
            text-align: center;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .prediction-result.make {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .prediction-result.miss {
            background: linear-gradient(135deg, #f44336, #da190b);
            color: white;
        }

        .prediction-text {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .confidence {
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .shot-visual {
            text-align: center;
            margin: 30px 0;
        }

        .basketball-emoji {
            font-size: 120px;
            display: inline-block;
            animation: bounce 1s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        .back-btn {
            width: 100%;
            padding: 14px;
            background: #333;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .back-btn:hover {
            background: #555;
            transform: translateY(-2px);
        }

        /* Loading state */
        .predict-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .predict-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner .basketball-emoji {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .content-wrapper {
                padding: 20px;
                justify-content: center;
            }
            
            .container {
                margin: 0 auto;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
                max-height: 50vh;
            }
            
            .full-width {
                grid-column: span 1;
            }
            
            .form-card, .result-card {
                padding: 25px;
            }
            
            .form-header h1 {
                font-size: 1.5rem;
            }
            
            .prediction-text {
                font-size: 1.3rem;
            }
            
            .basketball-emoji {
                font-size: 80px;
            }
        }

        /* Scrollbar for body */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #FF6B35;
            border-radius: 10px;
        }
    </style>
</head>

    </div>

    <script>
    // Create floating particles
    function createParticles() {
        const particleCount = 40;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 5 + 2;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.animationDuration = `${Math.random() * 15 + 10}s`;
            particle.style.animationDelay = `${Math.random() * 5}s`;
            document.body.appendChild(particle);
        }
    }

    const formCard = document.getElementById('formCard');
    const resultCard = document.getElementById('resultCard');
    const predictionForm = document.getElementById('predictionForm');
    const predictBtn = document.getElementById('predictBtn');
    const backBtn = document.getElementById('backBtn');
    const resultContent = document.getElementById('resultContent');

    // Handle form submission with AJAX
    predictionForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Hide form card, show loading in result card
        formCard.classList.add('hide');
        resultCard.classList.add('show');
        
        // Show loading state
        resultContent.innerHTML = `
            <div class="loading-spinner">
                <div class="basketball-emoji">🏀</div>
                <h3 style="margin-top: 20px; color: #333;">Analyzing Shot...</h3>
                <p style="color: #666; margin-top: 10px;">Processing your shot parameters</p>
            </div>
        `;
        
        // Collect form data
        const formData = new FormData(predictionForm);
        
        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: formData
            });
            
            const data = await response.json();
            
            if (data.success) {
                // Display result based on JSON response
                const isMade = data.is_made;
                const confidence = data.confidence;
                const result = data.result;
                
                resultContent.innerHTML = `
                    <div class="prediction-result ${isMade ? 'make' : 'miss'}">
                        <div class="prediction-text">${isMade ? '🏆 SHOT MADE! 🏆' : '💔 SHOT MISSED 💔'}</div>
                        <div class="confidence">🏀 ${result} | Confidence: ${confidence}%</div>
                    </div>
                    <div class="shot-visual">
                        <div class="basketball-emoji">🏀</div>
                    </div>
                `;
            } else if (data.error) {
                resultContent.innerHTML = `
                    <div class="prediction-result miss">
                        <div class="prediction-text">⚠️ ERROR</div>
                        <div class="confidence">${data.error}</div>
                    </div>
                    <div class="shot-visual">
                        <div class="basketball-emoji">🏀</div>
                    </div>
                `;
            }
            
            // Trigger animation
            const basketball = resultContent.querySelector('.basketball-emoji');
            if (basketball) {
                basketball.style.animation = 'none';
                setTimeout(() => {
                    basketball.style.animation = 'bounce 1s ease-in-out';
                }, 10);
            }
            
        } catch (error) {
            console.error('Error:', error);
            resultContent.innerHTML = `
                <div class="prediction-result miss">
                    <div class="prediction-text">⚠️ ERROR</div>
                    <div class="confidence">Failed to get prediction. Please try again.</div>
                </div>
                <div class="shot-visual">
                    <div class="basketball-emoji">🏀</div>
                </div>
            `;
        }
    });
    
    // Back button functionality
    backBtn.addEventListener('click', function() {
        resultCard.classList.remove('show');
        formCard.classList.remove('hide');
    });
    
    // Create background particles
    createParticles();
    
    // Log successful load
    console.log("✅ Basketball Shot Predictor UI Loaded Successfully!");
    console.log("🎯 Kobe Bryant full background active");
    console.log("📊 Using AJAX for predictions");
</script></body>
</html>
