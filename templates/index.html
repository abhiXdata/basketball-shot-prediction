<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Shot Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .alert {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        form {
            display: grid;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        input, select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            background: linear-gradient(135deg, #FF6B35, #FF8C42);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,53,0.3);
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏀 Basketball Shot Predictor</h1>
        
        <div class="alert">
            ✅ Application Loaded Successfully! | Time: <span id="timestamp"></span>
        </div>
        
        <form action="/predict" method="POST">
            <div class="form-group">
                <label>Action Type:</label>
                <input type="number" name="action_type" required value="1">
            </div>
            
            <div class="form-group">
                <label>Combined Shot Type:</label>
                <input type="number" name="combined_shot_type" required value="1">
            </div>
            
            <div class="form-group">
                <label>Location X:</label>
                <input type="number" step="any" name="loc_x" required value="0">
            </div>
            
            <div class="form-group">
                <label>Location Y:</label>
                <input type="number" step="any" name="loc_y" required value="0">
            </div>
            
            <div class="form-group">
                <label>Period:</label>
                <input type="number" name="period" required value="4">
            </div>
            
            <div class="form-group">
                <label>Playoffs (0 or 1):</label>
                <input type="number" name="playoffs" required value="0">
            </div>
            
            <div class="form-group">
                <label>Season:</label>
                <input type="number" name="season" required value="2023">
            </div>
            
            <div class="form-group">
                <label>Shot Distance:</label>
                <input type="number" name="shot_distance" required value="15">
            </div>
            
            <div class="form-group">
                <label>Shot Type:</label>
                <input type="number" name="shot_type" required value="1">
            </div>
            
            <div class="form-group">
                <label>Shot Zone Area:</label>
                <input type="number" name="shot_zone_area" required value="1">
            </div>
            
            <div class="form-group">
                <label>Shot Zone Basic:</label>
                <input type="number" name="shot_zone_basic" required value="1">
            </div>
            
            <div class="form-group">
                <label>Shot Zone Range:</label>
                <input type="number" name="shot_zone_range" required value="1">
            </div>
            
            <div class="form-group">
                <label>Matchup:</label>
                <input type="number" name="matchup" required value="1">
            </div>
            
            <div class="form-group">
                <label>Opponent:</label>
                <input type="number" name="opponent" required value="1">
            </div>
            
            <div class="form-group">
                <label>Time Remaining:</label>
                <input type="number" name="time_remaining" required value="120">
            </div>
            
            <button type="submit">🔮 Predict Shot</button>
        </form>
        
        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>
    
    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
        console.log("✅ Index.html loaded successfully!");
        console.log("Current URL:", window.location.href);
    </script>
</body>
</html>
