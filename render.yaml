services:
  - type: web
    name: basketball-shot-predictor
    runtime: python
    plan: free
    region: oregon
    buildCommand: |
      python --version
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
    startCommand: gunicorn --timeout 120 --workers 1 --log-level debug app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PYTHONUNBUFFERED
        value: true
